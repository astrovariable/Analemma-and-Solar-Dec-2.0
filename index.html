<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solar Shadow Tracking</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:12px;
}

h2{
text-align:center;
}

.tab{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:10px;
}

button{
padding:8px 12px;
margin:3px;
flex-grow:1;
}

input{
padding:6px;
margin-top:4px;
width:100%;
box-sizing:border-box;
}

.controls{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:10px;
}

canvas{
border:1px solid black;
margin-top:15px;
width:100%;
height:auto;
}

.active{
background:#333;
color:white;
}

#output{
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Solar Shadow Tracking</h2>

<div class="tab">

<button onclick="showPage('daily')" id="dailyBtn" class="active">Daily Shadow</button>

<button onclick="showPage('analemma')" id="analemmaBtn">Analemma</button>


</div>


<div class="controls">

<div>
<label>Latitude</label><br>
<input id="lat" type="number" value="23" step="0.01">
</div>

<div>
<label>Longitude</label><br>
<input id="lon" type="number" value="72" step="0.01">
</div>

<div>
<label>Date</label><br>
<input id="date" type="date">
</div>

<div>
<label>Time</label><br>
<input id="time" type="time">
</div>

<div>
<label>Gnomon Height (cm)</label><br>
<input id="height" type="number" value="20">
</div>

</div>

<br>

<button onclick="drawBoard()">Draw Board</button>
<button onclick="plotDaily()">Plot Daily Shadow</button>
<button onclick="plotAnalemma()">Plot Analemma</button>
<button onclick="calcAltitude()">Calculate Altitude</button>
<button onclick="observationWindow()">Observation Window</button>

<div id="output"></div>

<canvas id="board"></canvas>

<script>

let mode="daily"

function showPage(m){

mode=m

dailyBtn.classList.remove("active")
analemmaBtn.classList.remove("active")
altBtn.classList.remove("active")
windowBtn.classList.remove("active")

if(m==="daily") dailyBtn.classList.add("active")
if(m==="analemma") analemmaBtn.classList.add("active")
if(m==="altitude") altBtn.classList.add("active")
if(m==="window") windowBtn.classList.add("active")

drawBoard()

}


function dayOfYear(date){

let start=new Date(date.getFullYear(),0,0)
let diff=date-start
let oneDay=1000*60*60*24

return Math.floor(diff/oneDay)

}



function solarPosition(lat,lon,date,IST){

let N = dayOfYear(date)

let gamma = 2*Math.PI/365 * (N - 1 + (IST - 12)/24)

let EoT =
229.18 * (
0.000075
+ 0.001868*Math.cos(gamma)
-0.032077*Math.sin(gamma)
-0.014615*Math.cos(2*gamma)
-0.040849*Math.sin(2*gamma)
)

let dec =
0.006918
-0.399912*Math.cos(gamma)
+0.070257*Math.sin(gamma)
-0.006758*Math.cos(2*gamma)
+0.000907*Math.sin(2*gamma)
-0.002697*Math.cos(3*gamma)
+0.00148*Math.sin(3*gamma)

let timeOffset=EoT+4*(lon-82.5)

let tst=IST*60+timeOffset

let H=tst/4-180

let h=H*Math.PI/180

let phi=lat*Math.PI/180

let sinAlt =
Math.sin(phi)*Math.sin(dec) +
Math.cos(phi)*Math.cos(dec)*Math.cos(h)

let alt=Math.asin(sinAlt)

let cosAz =
(Math.sin(dec)-Math.sin(alt)*Math.sin(phi)) /
(Math.cos(alt)*Math.cos(phi))

let az=Math.acos(cosAz)

if(H>0) az=2*Math.PI-az

return {alt:alt,az:az}

}


function resizeCanvas(){

let canvas=document.getElementById("board")

let width=canvas.clientWidth

canvas.width=width
canvas.height=width*0.72

}


function drawBoard(){

resizeCanvas()


let canvas=document.getElementById("board")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

let scale=Math.min(canvas.width/35,canvas.height/30)

let boardW
let boardH

if(mode==="daily"){

boardW=29.7*scale
boardH=21*scale

}else{

boardW=21*scale
boardH=29.7*scale

}

let originX=(canvas.width-boardW)/2
let originY=(canvas.height-boardH)/2

let gx
let gy

if(mode==="daily"){

gx=originX+(29.7-14.8)*scale
gy=originY+14*scale

}else{

gx=originX+18.5*scale
gy=originY+24*scale

}

ctx.strokeRect(originX,originY,boardW,boardH)

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(gx,gy,5,0,2*Math.PI)
ctx.fill()

window.boardData={
gx,gy,
originX,originY,
boardW,boardH,
scale
}

}



function plotDaily(){

if(mode!=="daily") return

drawBoard()

let lat=parseFloat(latInput.value)
let lon=parseFloat(lonInput.value)
let height=parseFloat(heightInput.value)

let dateStr=dateInput.value
if(!dateStr) return

let d=new Date(dateStr)

let ctx=board.getContext("2d")

ctx.strokeStyle="blue"

ctx.beginPath()

for(let t=6*60;t<=18*60;t+=5){

let IST=t/60

let pos=solarPosition(lat,lon,d,IST)

if(pos.alt<=0) continue

let L=height/Math.tan(pos.alt)

let saz=pos.az+Math.PI

let x=L*Math.sin(saz)
let y=L*Math.cos(saz)

let px=boardData.gx+x*boardData.scale
let py=boardData.gy-y*boardData.scale

if(
px>boardData.originX &&
px<boardData.originX+boardData.boardW &&
py>boardData.originY &&
py<boardData.originY+boardData.boardH
){
ctx.lineTo(px,py)
}

}

ctx.stroke()

}



function plotAnalemma(){

if(mode!=="analemma") return

drawBoard()

let lat=parseFloat(latInput.value)
let lon=parseFloat(lonInput.value)
let height=parseFloat(heightInput.value)

let timeStr=timeInput.value
if(!timeStr) return

let t=timeStr.split(":")
let IST=parseFloat(t[0])+parseFloat(t[1])/60

let ctx=board.getContext("2d")

ctx.fillStyle="green"

for(let N=1;N<=365;N++){

let d=new Date(2026,0)
d.setDate(N)

let pos=solarPosition(lat,lon,d,IST)

if(pos.alt<=0) continue

let L=height/Math.tan(pos.alt)

let saz=pos.az+Math.PI

let x=L*Math.sin(saz)
let y=L*Math.cos(saz)

let px=boardData.gx+x*boardData.scale
let py=boardData.gy-y*boardData.scale

if(
px>boardData.originX &&
px<boardData.originX+boardData.boardW &&
py>boardData.originY &&
py<boardData.originY+boardData.boardH
){
ctx.beginPath()
ctx.arc(px,py,2,0,2*Math.PI)
ctx.fill()
}

}

}



function calcAltitude(){

let lat=parseFloat(latInput.value)
let lon=parseFloat(lonInput.value)
let height=parseFloat(heightInput.value)

let dateStr=dateInput.value
let timeStr=timeInput.value

if(!dateStr || !timeStr) return

let t=timeStr.split(":")
let IST=parseFloat(t[0])+parseFloat(t[1])/60

let d=new Date(dateStr)

let pos=solarPosition(lat,lon,d,IST)

let altDeg=pos.alt*180/Math.PI

let L=height/Math.tan(pos.alt)

output.innerHTML=
"Solar Altitude: "+altDeg.toFixed(2)+"°<br>"+
"Shadow Length: "+L.toFixed(2)+" cm"

}


function formatTime(decimalHour){

let h=Math.floor(decimalHour)
let m=Math.round((decimalHour-h)*60)

if(m==60){
h++
m=0
}

let hh=h.toString().padStart(2,'0')
let mm=m.toString().padStart(2,'0')

return hh+":"+mm

}



function observationWindow(){

let lat=parseFloat(latInput.value)
let lon=parseFloat(lonInput.value)
let height=parseFloat(heightInput.value)

let dateStr=dateInput.value
if(!dateStr) return

let d=new Date(dateStr)

let start=null
let end=null

// Board dimensions (landscape A4)
let boardW=29.7
let boardH=21

// Gnomon position relative to board
let gx=29.7-14.8
let gy=14

for(let t=5*60;t<=19*60;t+=1){

let IST=t/60

let pos=solarPosition(lat,lon,d,IST)

if(pos.alt<=0) continue

let L=height/Math.tan(pos.alt)

let saz=pos.az+Math.PI

let x=L*Math.sin(saz)
let y=L*Math.cos(saz)

let px=gx+x
let py=gy-y

if(
px>=0 &&
px<=boardW &&
py>=0 &&
py<=boardH
){

if(start===null) start=IST
end=IST

}

}

if(start!==null){

output.innerHTML=
"Observation Window:<br>"+
formatTime(start)+" to "+
formatTime(end)+" IST"

}else{

output.innerHTML="Shadow never falls inside board."

}

}



let latInput=document.getElementById("lat")
let lonInput=document.getElementById("lon")
let dateInput=document.getElementById("date")
let timeInput=document.getElementById("time")
let heightInput=document.getElementById("height")

drawBoard()

</script>

</body>
</html>
